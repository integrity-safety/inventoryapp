# Render blueprint. Commit this at the repo root, then in Render:
#   New + -> Blueprint -> pick this repo. It provisions all three resources.
databases:
  - name: inventory-db
    databaseName: inventory
    plan: free

services:
  # --- Django API + admin -----------------------------------------------
  - type: web
    name: inventory-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      # After the static site is live, set this to its URL in the dashboard.
      - key: FRONTEND_ORIGINS
        sync: false
      # First manager account, created automatically on first deploy (build.sh).
      # Render will prompt you for these values when you apply the blueprint.
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  # --- React PWA (static) -----------------------------------------------
  - type: web
    name: inventory-pwa
    runtime: static
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      # Point the PWA at the API. Set to the inventory-api URL after first deploy.
      - key: VITE_API_BASE
        sync: false
    routes:
      # SPA fallback so client-side routes resolve to index.html.
      - type: rewrite
        source: /*
        destination: /index.html
